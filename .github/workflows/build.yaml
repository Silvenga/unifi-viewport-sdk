name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Mozilla-Actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Fmt
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace
      - name: Build
        run: cargo build --workspace
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Use groups
        run: ./scripts/check_use_groups.sh
      - name: Test
        run: cargo test --workspace --all-features --no-fail-fast
      - name: Doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: check
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Mozilla-Actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Ensure cross is installed
        run: cargo install cross
      - name: Build
        run: cross build -p unifi-cli --target x86_64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unifi-cli-linux
          path: target/x86_64-unknown-linux-gnu/release/unifi-cli

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: check
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Mozilla-Actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Build
        run: cargo build -p unifi-cli --release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unifi-cli-windows
          path: target/release/unifi-cli.exe